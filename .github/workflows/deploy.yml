name: Deploy Production

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  unit-test:
    name: unit test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run test suite
        env:
          AUTH_PROVIDER: memory
          DATA_BACKEND: memory
          RESEND_API_KEY: ""
          RESEND_FROM_EMAIL: noreply@test.example.com
        run: pytest tests -m "not component"

  component-test:
    name: component test
    needs: unit-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Start test MySQL via docker-compose.test.yml
        run: docker compose -f docker-compose.test.yml up -d --wait

      - name: Run component tests
        env:
          AUTH_PROVIDER: firebase
          DATA_BACKEND: mysql
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3307
          MYSQL_DATABASE: volunteer_test
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_pass
          MYSQL_POOL_SIZE: 2
          FLASK_SECRET_KEY: ci-component-test-secret
          DEMO_DB_BOOTSTRAP_MODE: disabled
          FIREBASE_API_KEY: test-api-key
          FIREBASE_AUTH_DOMAIN: test.firebaseapp.com
          FIREBASE_PROJECT_ID: test-project
          FIREBASE_APP_ID: 1:000000000000:web:0000000000000000
          FIREBASE_ADMIN_CREDENTIALS: '{"type":"service_account"}'
          RESEND_API_KEY: test-resend-key
          RESEND_FROM_EMAIL: noreply@test.example.com
        run: >
          python -m pytest tests/component/
          --override-ini="addopts="
          -v
          --tb=short
          -m component

      - name: Stop test MySQL
        if: always()
        run: docker compose -f docker-compose.test.yml down

  deploy:
    needs: component-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to DigitalOcean App Platform
        uses: digitalocean/app_action/deploy@v2
        env:
          DIGITALOCEAN_DB_CLUSTER_NAME: ${{ vars.DIGITALOCEAN_DB_CLUSTER_NAME }}
          FLASK_SECRET_KEY: ${{ secrets.FLASK_SECRET_KEY }}
          FIREBASE_API_KEY: ${{ vars.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ vars.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
          FIREBASE_APP_ID: ${{ vars.FIREBASE_APP_ID }}
          FIREBASE_ADMIN_CREDENTIALS_JSON: ${{ secrets.FIREBASE_ADMIN_CREDENTIALS_JSON }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ vars.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REDIRECT_URI: ${{ vars.GOOGLE_OAUTH_REDIRECT_URI }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ vars.RESEND_FROM_EMAIL }}
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          app_spec_location: .do/app.yaml
          print_build_logs: true
          print_deploy_logs: true
