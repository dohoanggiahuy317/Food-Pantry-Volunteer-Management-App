name: Component Tests

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  component-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Start test MySQL via docker-compose.test.yml
        run: docker compose -f docker-compose.test.yml up -d --wait

      - name: Run component tests
        env:
          AUTH_PROVIDER: firebase
          DATA_BACKEND: mysql
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3307
          MYSQL_DATABASE: volunteer_test
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_pass
          MYSQL_POOL_SIZE: 2
          FLASK_SECRET_KEY: ci-component-test-secret
          DEMO_DB_BOOTSTRAP_MODE: disabled
          # Dummy Firebase values — SDK init is bypassed by the mock fixture;
          # these satisfy the non-empty check in FirebaseAuthService.__init__ only.
          FIREBASE_API_KEY: test-api-key
          FIREBASE_AUTH_DOMAIN: test.firebaseapp.com
          FIREBASE_PROJECT_ID: test-project
          FIREBASE_APP_ID: 1:000000000000:web:0000000000000000
          FIREBASE_ADMIN_CREDENTIALS: '{"type":"service_account"}'
          # Dummy Resend values — resend.Emails.send is patched out in every test.
          RESEND_API_KEY: test-resend-key
          RESEND_FROM_EMAIL: noreply@test.example.com
        run: >
          python -m pytest tests/component/
          --override-ini="addopts="
          -v
          --tb=short
          -m component

      - name: Stop test MySQL
        if: always()
        run: docker compose -f docker-compose.test.yml down
